name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow one concurrent deployment, but don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

# Grant GITHUB_TOKEN the permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Install spreet
        run: cargo install spreet

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      - name: Build viewer
        run: npm run build:app
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
